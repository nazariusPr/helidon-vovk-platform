services:
  auth-service:
    build:
      context: ./auth-service
    image: auth-service:latest
    container_name: auth-service
    env_file:
      - .env
    ports:
      - "9100:9100"
    depends_on:
      helidon-db:
        condition: service_healthy
    networks:
      - helidon_network

  equipment-service:
    build:
      context: ./equipment-service
    image: equipment-service:latest
    container_name: equipment-service
    env_file:
      - .env
    ports:
      - "9200:9200"
    depends_on:
      helidon-db:
        condition: service_healthy
    networks:
      - helidon_network

  inspection-service:
    build:
      context: ./inspection-service
    image: inspection-service:latest
    container_name: inspection-service
    env_file:
      - .env
    ports:
      - "9300:9300"
    depends_on:
      helidon-db:
        condition: service_healthy
    networks:
      - helidon_network

  kong-migrations:
    image: kong:latest
    container_name: kong-migrations
    depends_on:
      kong-db:
        condition: service_healthy
    environment:
      KONG_DATABASE: postgres
      KONG_PG_HOST: kong-db
      KONG_PG_USER: ${KONG_DB_USERNAME}
      KONG_PG_PASSWORD: ${KONG_DB_PASSWORD}
      KONG_PG_DATABASE: ${KONG_DB_NAME}
    command: kong migrations bootstrap
    networks:
      - helidon_network

  kong:
    image: kong:latest
    container_name: kong
    env_file:
      - .env
    depends_on:
      kong-db:
        condition: service_healthy
      kong-migrations:
        condition: service_completed_successfully
    environment:
      KONG_DATABASE: postgres
      KONG_PG_HOST: kong-db
      KONG_PG_USER: ${KONG_DB_USERNAME}
      KONG_PG_PASSWORD: ${KONG_DB_PASSWORD}
      KONG_PG_DATABASE: ${KONG_DB_NAME}

      KONG_PROXY_LISTEN: 0.0.0.0:8000
      KONG_ADMIN_LISTEN: 0.0.0.0:8001

      KONG_PROXY_ACCESS_LOG: /dev/stdout
      KONG_ADMIN_ACCESS_LOG: /dev/stdout
    ports:
      - "8000:8000"
      - "8001:8001"
    volumes:
      - ./kong.yml:/config/kong.yml
    networks:
      - helidon_network

  konga:
    image: pantsel/konga
    container_name: konga
    environment:
      - DB_ADAPTER=postgres
      - DB_HOST=konga-db
      - DB_USER=${KONGA_DB_USERNAME}
      - DB_PASSWORD=${KONGA_DB_PASSWORD}
      - DB_DATABASE=${KONGA_DB_NAME}
    ports:
      - "1337:1337"
    depends_on:
      konga-db:
        condition: service_healthy
    networks:
      - helidon_network

  helidon-db:
    image: postgres:17
    container_name: helidon-db
    environment:
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - "5432:5432"
    volumes:
      - helidon_data:/var/lib/postgresql/data
    networks:
      - helidon_network
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${DB_USERNAME}" ]
      interval: 5s
      timeout: 5s
      retries: 5

  kong-db:
    image: postgres:13
    container_name: kong-db
    environment:
      POSTGRES_USER: ${KONG_DB_USERNAME}
      POSTGRES_PASSWORD: ${KONG_DB_PASSWORD}
      POSTGRES_DB: ${KONG_DB_NAME}
    ports:
      - "5433:5432"
    volumes:
      - kong_data:/var/lib/postgresql/data
    networks:
      - helidon_network
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${KONG_DB_USERNAME}" ]
      interval: 5s
      timeout: 5s
      retries: 5

  konga-db:
    image: postgres:11
    container_name: konga-db
    environment:
      POSTGRES_USER: ${KONGA_DB_USERNAME}
      POSTGRES_PASSWORD: ${KONGA_DB_PASSWORD}
      POSTGRES_DB: ${KONGA_DB_NAME}
    ports:
      - "5434:5432"
    volumes:
      - konga_data:/var/lib/postgresql/data
    networks:
      - helidon_network
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${KONGA_DB_USERNAME}" ]
      interval: 5s
      timeout: 5s
      retries: 5

networks:
  helidon_network:
    driver: bridge

volumes:
  helidon_data:
    driver: local
  kong_data:
    driver: local
  konga_data:
    driver: local