# ===============================
# Database configuration (override via .env in Docker)
# ===============================
db.url=jdbc:postgresql://localhost:5432/helidon_vovk_platform
db.username=postgres
db.password=root

# ===============================
# JWT configuration (override via .env in Docker)
# Default: classpath jwt-keys.json from JAR. Set SECURITY_PROVIDERS_JWT_SIGNING_KEY_RESOURCE
# to /app/jwt-keys.json and mount the file when using a custom key in Docker.
# ===============================
security.providers.jwt.algorithm=HS256
security.providers.jwt.issuer=helidon-jwt-demo
security.providers.jwt.expiration.seconds=3600
security.providers.jwt.signing.key.resource=jwt-keys.json
security.providers.jwt.verify.key.resource=jwt-keys.json